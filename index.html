<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR ohne Marker</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
    }

    main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100%;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      background: #e5e7eb;
    }

    .info {
      padding: 16px;
      line-height: 1.45;
    }

    .ar-button {
      position: absolute;
      right: 16px;
      bottom: 16px;
      border: 0;
      border-radius: 6px;
      padding: 12px 14px;
      background: #111827;
      color: white;
      font: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <!--
      LINK FÜR MIRO UND QR-CODE:
      Der GitHub-Pages-Link entsteht nach dem Veröffentlichen bei GitHub Pages.

      Der fertige Link sieht so aus:
      https://DEIN-GITHUB-NAME.github.io/DEIN-REPOSITORY/

      Dieser fertige Link wird:
      1. im Miroboard eingetragen
      2. in einen QR-Code umgewandelt
      3. als Abgabelink verwendet
    -->

    <!--
      SZENE AUSTAUSCHEN:
      src ist das Android/WebXR-Modell.
      ios-src ist das iPhone-Modell für Apple Quick Look.
      Ein GLB kann ein einzelnes Objekt oder eine ganze kleine Szene enthalten.

      Wenn die Dateien im Ordner assets liegen, diese Pfade nutzen:
      src="assets/szene.glb"
      ios-src="assets/szene.usdz"
    -->
    <model-viewer
      src="https://modelviewer.dev/shared-assets/models/Pizza_Wing.glb"
      ios-src="https://modelviewer.dev/shared-assets/models/Pizza_Wing.usdz"
      alt="AR-Szene"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1">
      <button class="ar-button" slot="ar-button">Szene im Raum platzieren</button>
    </model-viewer>

    <section class="info">
      <strong>AR ohne Marker:</strong> Diese Seite wird per Link oder QR-Code geöffnet. Danach wird die Szene über den AR-Button im Raum platziert.
    </section>
  </main>
</body>
</html>
